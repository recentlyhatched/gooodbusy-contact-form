<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:
        linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
}

.form-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:28px;
    padding:40px;
    box-shadow:
        0 20px 60px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
}

.logo{
    text-align:center;
    font-size:3rem;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:white;
    font-size:2rem;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:rgba(255,255,255,0.7);
    margin-bottom:35px;
}

.field{
    margin-bottom:18px;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:500;
}

input,
textarea{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    transition:all .3s ease;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,0.5);
}

input:focus,
textarea:focus{
    outline:none;
    background:rgba(255,255,255,0.15);
    box-shadow:0 0 0 3px rgba(99,102,241,0.4);
}

textarea{
    min-height:160px;
    resize:vertical;
}

.submit-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(99,102,241,.4);
}

.submit-btn:active{
    transform:translateY(0);
}

#status{
    margin-top:20px;
    text-align:center;
    color:white;
    font-weight:500;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:rgba(255,255,255,0.6);
    font-size:14px;
}

@media(max-width:768px){
    .form-card{
        padding:25px;
    }

    h1{
        font-size:1.7rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="form-card">

        <div class="logo">💬</div>

        <h1>Send Us a Message</h1>

        <p class="subtitle">
            We'd love to hear from you. Submit your query and we'll get back to you shortly.
        </p>

        <form id="queryForm">

            <div class="field">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Akos Bonsu" required>
            </div>

            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="akos@example.com" required>
            </div>

            <div class="field">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="How can we help?" required>
            </div>

            <div class="field">
                <label>Your Message</label>
                <textarea id="message" placeholder="Type your message here..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">
                Send Message ✨
            </button>

        </form>

        <div id="status"></div>

        <div class="footer">
            Secure • Fast • Professional
        </div>

    </div>
</div>

<script>
emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY"
});

document
.getElementById("queryForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const button =
        document.querySelector(".submit-btn");

    button.innerHTML = "Sending...";
    button.disabled = true;

    const params = {
        from_name: document.getElementById("name").value,
        from_email: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        message: document.getElementById("message").value,
        to_email: "gooodbusy@gmail.com"
    };

    emailjs.send(
        "YOUR_SERVICE_ID",
        "YOUR_TEMPLATE_ID",
        params
    )
    .then(() => {

        document.getElementById("status").innerHTML =
            "✅ Thank you! Your message has been sent.";

        document.getElementById("queryForm").reset();

        button.innerHTML = "Send Message ✨";
        button.disabled = false;

    })
    .catch(() => {

        document.getElementById("status").innerHTML =
            "❌ Something went wrong. Please try again.";

        button.innerHTML = "Send Message ✨";
        button.disabled = false;
    });
});
</script>

</body>
</html>
