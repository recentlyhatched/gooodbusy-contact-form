<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --primary:#D9D9D9;
    --primary-hover:#fc6dab;
    --text:#334155;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at top left,#eef4ff 0%,transparent 35%),
        radial-gradient(circle at bottom right,#f6f0ff 0%,transparent 35%),
        var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:30px;
}

.container{
    width:100%;
    max-width:650px;
}

.form-card{
    background:var(--card);
    padding:40px;
    border-radius:28px;
    box-shadow:
        0 10px 40px rgba(15,23,42,.06),
        0 2px 10px rgba(15,23,42,.03);
    border:1px solid rgba(255,255,255,.8);
    backdrop-filter:blur(10px);
}

.form-header{
    text-align:center;
    margin-bottom:30px;
}

.form-header h1{
    color:var(--text);
    font-size:2rem;
    font-weight:700;
    margin-bottom:10px;
}

.form-header p{
    color:var(--muted);
    line-height:1.6;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:var(--text);
    font-size:.95rem;
    font-weight:600;
}

input,
textarea{
    width:100%;
    padding:15px 18px;
    border:1px solid var(--border);
    border-radius:16px;
    font-size:15px;
    transition:.3s ease;
    background:#fcfdff;
    color:var(--text);
}

input:focus,
textarea:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(124,156,245,.15);
    background:white;
}

textarea{
    resize:vertical;
    min-height:150px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(
        135deg,
        var(--primary),
        #EFF2EF
    );
    color:black;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s ease;
}

button:hover{
    transform:translateY(-2px);
    background:linear-gradient(
        135deg,
        var(--primary-hover),
        #EF27A6
    );
    box-shadow:0 12px 24px rgba(124,156,245,.25);
}

button:active{
    transform:translateY(0);
}

#status{
    margin-top:18px;
    text-align:center;
    font-weight:500;
    color:var(--muted);
}

.footer-note{
    text-align:center;
    margin-top:20px;
    color:var(--muted);
    font-size:.85rem;
}

@media (max-width:640px){
    .form-card{
        padding:28px;
    }

    .form-header h1{
        font-size:1.7rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="form-card">

        <div class="form-header">
            <h1>✨ Send Us a Message</h1>
            <p>
                We'd love to hear from you. Fill out the form below and we'll get back to you soon.
            </p>
        </div>

        <form id="queryForm">

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" required>
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea id="message" required></textarea>
            </div>

            <button type="submit">
                Send Message
            </button>

        </form>

        <div id="status"></div>

        <div class="footer-note">
            Your message will be delivered securely.
        </div>

    </div>

</div>

<script>
emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY"
});

document.getElementById("queryForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const params = {
        from_name: document.getElementById("name").value,
        from_email: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        message: document.getElementById("message").value,
        to_email: "gooodbusy@gmail.com"
    };

    document.getElementById("status").innerHTML =
        "Sending your message...";

    emailjs.send(
        "YOUR_SERVICE_ID",
        "YOUR_TEMPLATE_ID",
        params
    )
    .then(function(){

        document.getElementById("status").innerHTML =
            "💜 Thank you! Your message has been sent.";

        document.getElementById("queryForm").reset();

    })
    .catch(function(error){

        document.getElementById("status").innerHTML =
            "Sorry, something went wrong. Please try again.";

        console.error(error);
    });

});
</script>

</body>
</html>
