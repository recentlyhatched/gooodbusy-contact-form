<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


</head>

<body>
    <nav>

        <div class="logo"><a href="/"><img src="/logo.png" height="100px" alt="goood busy logo"></a></div>

        <div class="nav-links">
            <a href="/">Home</a>
            <!-- <a href="#">Services</a> -->
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </div>

        <a href="https://github.com/recentlyhatched"><button class="nav-btn">
            Get Technical
        </button></a>

    </nav>
    
    <div class="container">

        <div class="glass-card">

            <div class="form-header center">
                <h1>Send a Message</h1>
                <p>
                    Fill out the form below and hear back soon!
                </p>
            </div>
            <main>
                <form id="queryForm">

                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="subject" required>
                    </div>

                    <div class="form-group">
                        <label>Your Message</label>
                        <textarea id="message" required></textarea>
                    </div>

                    <button class="primary-btn centered-btn"type="submit">
                        Send Message
                    </button>

                </form>
            </main>
        </div>
        <div id="status"></div>
        <footer>
            <div class="footer-note center">
                    Your message will be delivered securely.
                </div>
            </footer>
        </div>

<script>
emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY"
});

document.getElementById("queryForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const params = {
        from_name: document.getElementById("name").value,
        from_email: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        message: document.getElementById("message").value,
        to_email: "gooodbusy@gmail.com"
    };

    document.getElementById("status").innerHTML =
        "Sending your message...";

    emailjs.send(
        "YOUR_SERVICE_ID",
        "YOUR_TEMPLATE_ID",
        params
    )
    .then(function(){

        document.getElementById("status").innerHTML =
            "💜 Thank you! Your message has been sent.";

        document.getElementById("queryForm").reset();

    })
    .catch(function(error){

        document.getElementById("status").innerHTML =
            "Sorry, something went wrong. Please try again.";

        console.error(error);
    });

});
</script>

</body>
</html>
